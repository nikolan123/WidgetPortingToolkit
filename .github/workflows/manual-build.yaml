name: Manual Build Artifact

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build-artifact:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build App
        run: |
          xcodebuild -scheme "Widget Porting Toolkit" \
                     -configuration Release \
                     -destination "platform=macOS" \
                     ARCHS="arm64 x86_64" \
                     ONLY_ACTIVE_ARCH=NO \
                     BUILD_DIR=build \
                     clean build

      - name: Package ZIP
        run: |
          cd build/Release
          zip -r "Widget Porting Toolkit.zip" "Widget Porting Toolkit.app"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Widget Porting Toolkit.zip
          path: build/Release/Widget Porting Toolkit.zip
          if-no-files-found: error
